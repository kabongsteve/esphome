esphome:
  name: reargate
  friendly_name: reargate

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# LED exposed as binary light
output:
  - platform: gpio
    pin: GPIO23
    id: output_led

light:
  - platform: binary
    id: light_led
    name: LED
    output: output_led

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
    name: button
    on_click:
    - min_length: 250ms
      max_length: 500ms
      then:
        - cover.toggle: gate
    on_double_click:
      min_length: 50ms
      max_length: 500ms
      then:
        - switch.toggle: hold

# Relays exposed as switches
switch:
  - platform: gpio
    pin: GPIO16
    id: relay_1
    name: Close Relay
    interlock: [relay_2]
    on_turn_on:
    # - light.turn_on: light_led
    - delay: 12s
    - switch.turn_off: relay_1
    # - light.turn_off: light_led

  - platform: gpio
    pin: GPIO17
    id: relay_2
    name: Open Relay
    interlock: [relay_1]
    on_turn_on:
    # - light.turn_on: light_led
    - delay: 12s
    - switch.turn_off: relay_2
    # - script.execute: auto_close
    # - script.execute: max_open_timer

  - platform: template
    id: hold
    name: Hold Open
    optimistic: true
    assumed_state: false
    on_turn_on:
    - delay: 2s
    - cover.open: gate
    on_turn_off:
    - delay: 2s
    - cover.close: gate

cover:
  - platform: time_based
    id: gate
    name: Gate
    manual_control: true
    has_built_in_endstop: true
    open_action:
      - switch.turn_on: relay_2
      - script.execute: auto_close
      - script.execute: max_open_timer
    open_duration: 10s
    close_action:
      - script.stop: auto_close
      - light.turn_off: light_led
      - switch.turn_on: relay_1
      - switch.turn_off: hold
    close_duration: 10s

    stop_action:
      - switch.turn_off: relay_1
      - switch.turn_off: relay_2

number:
  - platform: template
    id: open_duration
    name: Open Duration (Seconds)
    optimistic: true
    initial_value: 60
    min_value: 5
    max_value: 1200
    step: 5

  - platform: template
    id: hold_duration
    name: Hold Duration (Mins)
    optimistic: true
    initial_value: 60
    min_value: 5
    max_value: 360
    step: 1

script:
  - id: auto_close
    mode: restart
    then:
      - light.turn_off: light_led
      - if:
          condition:
            - switch.is_off: hold
          then:
          - light.turn_on: light_led
          - delay: !lambda 'return id(open_duration).state * 1000;' 
          - cover.close: gate
          - light.turn_off: light_led

  - id: max_open_timer
    mode: restart
    then:
      - delay: !lambda 'return id(hold_duration).state * 60 * 1000;' 
      - cover.close: gate

# Enable logging
logger:

