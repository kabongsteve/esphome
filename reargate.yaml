esphome:
  name: reargate
  friendly_name: reargate

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:
  level: INFO
  baud_rate: 0

# Enable Home Assistant API
api:
  encryption:
    key: "U4RGsTGSQMh+mjaPjQuRHSIBk+h/de2FAJ3kRtXN+mk="

ota:
  - platform: esphome
    password: "ee535e173be93995552584f648726373"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

web_server:
  include_internal: true
  js_include: "./v2/www.js"
  js_url: ""
  css_url: ""
  css_include: "./v2/webserver-v1.min.js"
  version: 2

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  #frequency: 10kHz

sensor:
  - platform: wifi_signal
    name: "WiFi Signal Sensor"
    update_interval: 60s

  - platform: ina226
    id: power_sensor
    address: 0x40
    shunt_resistance: 0.1 ohm
    max_current: 5A
    adc_time: 1100us
    adc_averaging: 16
    
    power:
      name: "Power"
      id: gate_power
      on_value_range:
        - above: 9.5
          then:
            if:
              condition: 
                - lambda: 'return id(gate).position < 0.8;'
              then:
                - cover.toggle: gate
                - cover.toggle: gate
                - delay: 2 sec
                - cover.stop: gate

# LED exposed as binary light
output:
  - platform: gpio
    pin: GPIO23
    id: output_led

light:
  - platform: binary
    id: light_led
    name: LED
    internal: true
    output: output_led


binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
    name: button
    internal: true
    filters:
      - delayed_on: 100ms
    on_press:
      then:
        - logger.log:
            format: "Button Press"
            level: INFO
        - cover.toggle: gate
    on_click:
    - min_length: 1s
      max_length: 5s
      then:
        - logger.log:
            format: "Button Long Press"
            level: INFO
        - switch.toggle: hold

# Relays exposed as switches
switch:
  - platform: gpio
    pin: GPIO16
    id: relay_1
    name: Close Relay
    internal: true
    interlock: [relay_2]
    on_turn_on:
      - script.execute: monitor
      # - light.turn_on: light_led
      - delay: 12s
      - switch.turn_off: relay_1

  - platform: gpio
    pin: GPIO17
    id: relay_2
    name: Open Relay
    internal: true
    interlock: [relay_1]
    on_turn_on:
      - script.execute: monitor
      # - light.turn_on: light_led
      - delay: 12s
      - switch.turn_off: relay_2

  - platform: template
    id: hold
    name: Hold Open
    optimistic: true
    assumed_state: false
    on_turn_on:
    - cover.stop: gate
    - delay: 1s
    - cover.open: gate
    on_turn_off:
    - delay: 1s
    - cover.close: gate

cover:
  - platform: time_based
    id: gate
    name: Gate
    # manual_control: true
    has_built_in_endstop: true
    open_action:
      - logger.log:
          format: "Gate Opening"
          level: INFO
      - switch.turn_on: relay_2
      - script.execute: auto_close
      - script.execute: max_open_timer
    open_duration: 10s
    close_action:
      - logger.log:
          format: "Gate Closing"
          level: INFO
      - script.stop: auto_close
      - light.turn_off: light_led
      - switch.turn_on: relay_1
      - switch.turn_off: hold
    close_duration: 10s
    on_open:
      - logger.log:
          format: "Gate Open"
          level: INFO
    on_closed:
      - logger.log:
          format: "Gate Closed"
          level: INFO

    stop_action:
      - switch.turn_off: relay_1
      - switch.turn_off: relay_2
      - logger.log:
          format: "Gate Stopped %.0f%%"
          args: [ 'id(gate).position * 100' ]
          level: INFO
      - delay: 500ms

number:
  - platform: template
    id: open_duration
    name: Open Duration (Seconds)
    optimistic: true
    initial_value: 90
    min_value: 5
    max_value: 600
    step: 5

  - platform: template
    id: hold_duration
    name: Hold Duration (Mins)
    optimistic: true
    initial_value: 90
    min_value: 5
    max_value: 360
    step: 1

script:
  - id: auto_close
    mode: restart
    then:
      - light.turn_off: light_led
      - if:
          condition:
            - switch.is_off: hold
          then:
          - light.turn_on: light_led
          - delay: !lambda 'return id(open_duration).state * 1000;' 
          - cover.close: gate
          - light.turn_off: light_led

  - id: max_open_timer
    mode: restart
    then:
      - delay: !lambda 'return id(hold_duration).state * 60 * 1000;' 
      - cover.close: gate

  - id: monitor
    mode: restart
    then:
      - script.execute: progress
      - delay: 250ms    # wait for start power surge
      - component.update: power_sensor
      - while:
          condition:
            lambda: 'return id(gate).current_operation != CoverOperation::COVER_OPERATION_IDLE;'
          then:
            - component.update: power_sensor
            - delay: 250ms
      - delay: 250ms
      - component.update: power_sensor

  - id: progress
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return id(gate).current_operation != CoverOperation::COVER_OPERATION_IDLE;'
          then:
            - logger.log:
                format: "Gate %.0f%%"
                args: [ 'id(gate).position * 100' ]
                level: INFO
            - delay: 1s
