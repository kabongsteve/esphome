esphome:
  name: wavesharethermometer
  friendly_name: CoffeeThermometer
  on_boot:
    - light.control:
        id: backlight
        brightness: "80%"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf


psram:
  mode: octal
  speed: 80Mhz

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "Jw+l0d4OtMEg4q3g+fPHnrF97TTtWJtTJtsNOdlozT8="

ota:
  - platform: esphome
    password: "01c6d32124ed0e977505267371a9dd95"

wifi:
  ssid: !secret iot_ssid
  password: !secret wifi_password
  fast_connect: true
  min_auth_mode: WPA2
  output_power: 8.5dB

web_server:

spi:
  mosi_pin: GPIO11
  clk_pin: GPIO10
  miso_pin: GPIO12

i2c:
  sda: GPIO6
  scl: GPIO7

output:
  - platform: ledc
    pin: GPIO2
    id: backlight_pwm

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: ALWAYS_ON

display:
  - platform: ili9xxx
    model: gc9a01A
    id: screen
    cs_pin: GPIO9  #D2
    dc_pin: GPIO8
    reset_pin: GPIO14
    dimensions:
      width: 240
      height: 240
    color_palette: 8BIT
    color_order: bgr
    invert_colors: true
    rotation: 0
    auto_clear_enabled: false
    update_interval: never

touchscreen:
  id: touch
  platform: cst816
  interrupt_pin: GPIO5
  reset_pin: GPIO13
  address: 0x15
  transform:
    swap_xy: true
    mirror_x: true
  on_touch:
    - logger.log:
        format: "Touch %d %d"
        args: [ 'touch.x', 'touch.y']    
    - if:
        condition:
          switch.is_on: machine
        then:
          - lvgl.page.show: thermometer_page
        else:
          - script.execute: dim_delay

font:
  # - file: "gfonts://Roboto"
  #   id: roboto24
  #   size: 24
  #   bpp: 4
  #   glyphsets: GF_Latin_Core
  # - file: "gfonts://Roboto"
  #   id: roboto32
  #   size: 32
  #   bpp: 4
  #   glyphsets: GF_Latin_Core
  - file: "gfonts://Roboto"
    id: roboto48
    size: 40
    bpp: 4
    glyphsets: GF_Latin_Core
  - file: "gfonts://Roboto"
    id: roboto64
    size: 64
    bpp: 4
    glyphsets: GF_Latin_Core
  - file: 
      type: gfonts
      family: Science Gothic
    id: roboto80
    size: 80
    bpp: 4
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: icons_font
    size: 50
    glyphs: [
        "\U000F0425"    # mdi-power
      ]

lvgl:
  pages:
    - id: clock_page
      width: 100%
      bg_color: Black
      widgets:
          # Outer Clock Container
          - obj:
              height: 240
              width: 240
              align: center
              pad_all: 0
              bg_color: Black
              border_width: 0  
              scrollbar_mode: "OFF"
              widgets:
              - meter:
                  height: 256
                  width: 256
                  align: center
                  bg_color: Black
                  border_width: 0  

                  scales:
                    # Minor ticks
                    - ticks:
                        width: 2
                        count: 61
                        length: 10
                        color: DarkBlue
                      range_from: 0
                      range_to: 60
                      angle_range: 360
                      rotation: 270

                      # Minuite hand
                      indicators:
                        - line:
                            id: minute_hand
                            width: 3
                            color: darkseagreen
                            r_mod: -1
                    # Major ticks
                    - angle_range: 330
                      rotation: 270
                      range_from: 0
                      range_to: 11
                      ticks:
                        width: 3
                        count: 12
                        length: 20
                        color: Blue
                      indicators:
                        - line:
                            id: hour_hand
                            width: 5
                            color: darkseagreen
                            r_mod: -25
              - label:
                  pad_all: 0
                  border_width: 0
                  id: digital_time
                  align: CENTER
                  y: -30
                  text_font: roboto64
                  text_color: DarkOrchid
                  bg_color: Black

              - label:
                  pad_all: 0
                  border_width: 0
                  id: digital_date
                  align: CENTER
                  y: +25
                  text_font: roboto48
                  text_color: DarkOrchid
                  bg_color: Black
              - label:
                  pad_all: 0
                  border_width: 0
                  id: power
                  align: BOTTOM_MID
                  y: -20
                  text_font: icons_font
                  text_color: red
                  bg_color: Black
                  text: "\U000F0425"
    - id: thermometer_page
      width: 100%
      bg_color: Black
      widgets:
          # Outer Clock Container
          - obj:
              height: 240
              width: 240
              align: center
              pad_all: 0
              bg_color: Black
              border_width: 0  
              scrollbar_mode: "OFF"
              widgets:
              - meter:
                  height: 256
                  width: 256
                  align: center
                  bg_color: Black
                  border_width: 0
                  text_color: green

                  scales:
                    range_from: 0
                    range_to: 80
                    angle_range: 315
                    rotation: 90

                    # Minor ticks
                    ticks:
                      width: 1
                      count: 81
                      length: 10
                      color: Grey
                      major:
                        label_gap: 15
                        length: 15
                        stride: 5
                        width: 1
                        color: white
                    indicators:
                      - tick_style:
                          color_start: blue
                          color_end: red
                          start_value: 0
                          end_value: 70
                          local: true
                          width: 1
                      - arc:
                          color: red
                          start_value: 70
                          end_value: 80
                          r_mod: 0
                          width: 15
                      - arc:
                          id: temp_arc
                          color: orange
                          start_value: 0
                          width: 20
                          r_mod: 0
                          end_value: 10
              - label:
                  pad_all: 0
                  border_width: 0
                  id: temp_lbl
                  align: CENTER
                  y: 0
                  text_font: roboto80
                  bg_color: Black
                  text_color: blue

time:
  - platform: homeassistant
    id: local_time
    on_time:
      - seconds: 0
        minutes: /1
        then:
          - lvgl.indicator.update:
              id: minute_hand
              end_value: !lambda 'return id(local_time).now().minute;'
          - lvgl.indicator.update:
              id: hour_hand
              end_value: !lambda 'return id(local_time).now().hour % 12;'
          - lvgl.label.update:
              id: digital_time
              text:
                format: "%02d:%02d"
                args: [ id(local_time).now().hour, id(local_time).now().minute ]
          - lvgl.label.update:
              id: digital_date
              text: !lambda |-
                char buf[30];
                char dayname[] = "XXXSunMonTueWedThuFriSat";
                sprintf(buf, "%3.3s %d%s", &dayname[id(local_time).now().day_of_week * 3], id(local_time).now().day_of_month, (id(local_time).now().day_of_month % 10) == 1? "st" : (id(local_time).now().day_of_month % 10) == 2? "nd" : (id(local_time).now().day_of_month % 10) == 3? "rd" : "th");
                return std::string(buf);
    on_time_sync:
      then:
        - lvgl.indicator.update:
            id: minute_hand
            end_value: !lambda 'return id(local_time).now().minute;'
        - lvgl.indicator.update:
            id: hour_hand
            end_value: !lambda 'return id(local_time).now().hour % 12;'
        - lvgl.label.update:
            id: digital_time
            text:
              format: "%02d:%02d"
              args: [ id(local_time).now().hour, id(local_time).now().minute ]
        - lvgl.label.update:
            id: digital_date
            text: !lambda |-
              char buf[30];
              char dayname[] = "XXXSunMonTueWedThuFriSat";
              sprintf(buf, "%3.3s %d%s", &dayname[id(local_time).now().day_of_week * 3], id(local_time).now().day_of_month, (id(local_time).now().day_of_month % 10) == 1? "st" : (id(local_time).now().day_of_month % 10) == 2? "nd" : (id(local_time).now().day_of_month % 10) == 3? "rd" : "th");
              return std::string(buf);

binary_sensor:
  - platform: touchscreen
    name: power_btn
    x_min: 100
    x_max: 140
    y_min: 180
    y_max: 220
    on_press:
      - if:
          condition:
            switch.is_off: machine
          then:
            - switch.turn_on: machine


globals:
  - id: steadyCount
    type: int
    restore_value: no
    initial_value: '30'
  - id: steadyState
    type: int
    restore_value: no
    initial_value: '0'
  - id: lastState
    type: int
    restore_value: no
    initial_value: '0'
  - id: changeCount
    type: int
    restore_value: no
    initial_value: '0'

sensor:
  - platform: homeassistant
    id: kitchen_light
    entity_id: light.overhead_kitchen # Replace with the actual entity_id of your light in Home Assistant
    attribute: brightness # To get the on/off state
    internal: True
    on_value:
      - logger.log: "light changed"
      - if:
          condition: 
            lambda: 'return x > 0;'
          then:
            - light.control:
                id: backlight
                brightness: "80%"
          else:
            - light.control:
                id: backlight
                brightness: "30%"
  - platform: adc
    pin: GPIO18
    id: temp_sensor
    name: Temp Sensor
    attenuation: 12db
    samples: 10
    sampling_mode: avg
    internal: true
    update_interval: 0.1s
    filters:
      - clamp:
          min_value: 0.1
          max_value: 3.2
          ignore_out_of_range: true
  - platform: template
    id: temperature
    name: "Temperature"
    unit_of_measurement: "°C"
    lambda: |-
      const float A = 5.024114421e-3;
      const float B = -6.073293892e-4;
      const float C = 70.71922576e-7;
      const float KELVIN = 273.15;

      float R = id(temp_sensor).state * 1000;

      float result = 1 / (A + B*log(R) + C*pow(log(R), 3)) - KELVIN;
      return result;
    filters:
      - exponential_moving_average:
          alpha: 0.2
          send_every: 5
          send_first_at: 5
    update_interval: 0.1s
      
    on_value:
      - lvgl.indicator.update:
          id: temp_arc
          end_value: !lambda 'return int(floor(x));'
      - lvgl.label.update:
          id: temp_lbl
          text:
            format: "%2.0f"
            args: [ floor(x) ]
          text_color: !lambda |-
            lv_color_t c = (x < 40)? lv_palette_main(LV_PALETTE_BLUE): (x < 60)? lv_palette_main(LV_PALETTE_DEEP_ORANGE): lv_palette_main(LV_PALETTE_RED);
            //lv_obj_set_style_arc_color(id(temp_arc), c, LV_PART_INDICATOR | LV_STATE_DEFAULT);
            return c;
      - lambda: |-
          int wholeDeg = int(floor(x));
          if (id(lastState) != wholeDeg) {
            id(lastState) = wholeDeg;
            id(steadyState) = id(steadyCount);
            id(changeCount) += 1;

          }
          else {
            id(steadyState) -= 1;
            id(changeCount) = 0;
          }
          if (id(steadyState) == 0) {
            lvgl_lvglcomponent_id->show_page(clock_page->index, LV_SCR_LOAD_ANIM_NONE, 50);
            id (dim_delay).execute();
          }
          if (id(changeCount) > 2) {
            lvgl_lvglcomponent_id->show_page(thermometer_page->index, LV_SCR_LOAD_ANIM_NONE, 50);
            id (dim_delay).execute();
          }

switch:
  - platform: homeassistant
    entity_id: switch.bezzera
    id: machine
    on_turn_off:
      - lvgl.page.show: clock_page
      - light.control:
          id: backlight
          brightness: "30%"
    on_turn_on:
      - lvgl.page.show: thermometer_page
      - light.control:
          id: backlight
          brightness: "80%"

script:
  - id: dim_delay
    mode: restart
    then:
      - light.control:
          id: backlight
          brightness: "80%"
      - if:
          all:
            - lambda: 'return isnan(id(kitchen_light).state);'
            - lvgl.page.is_showing: clock_page
          then:
            - delay: 15s
            - if:
                condition:
                  lvgl.page.is_showing: clock_page
                then:
                  - light.control:
                      id: backlight
                      brightness: "30%"
