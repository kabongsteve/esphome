web_server:

spi:
  mosi_pin: GPIO9
  clk_pin: GPIO7

i2c:
  sda: GPIO5
  scl: GPIO6
  frequency: 800kHz

output:
  - platform: ledc
    pin: GPIO43
    id: backlight_pwm

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: ALWAYS_ON

display:
  - platform: ili9xxx
    model: gc9a01A
    id: screen
    cs_pin: GPIO2  #D2
    dc_pin: GPIO4
    dimensions:
      width: 240
      height: 240
    color_palette: 8BIT
    color_order: bgr
    invert_colors: true
    rotation: 270
    auto_clear_enabled: false
    update_interval: never

touchscreen:
  id: cst816d
  platform: cst816
  interrupt_pin: GPIO44
  skip_probe: true
  transform:
    swap_xy: true
    mirror_y: true
#  on_touch:
