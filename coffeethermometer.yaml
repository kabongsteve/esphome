lvgl:
  pages:
    - id: main_page
      width: 100%
      bg_color: Black
      widgets:
          # Outer Clock Container
          - obj:
              height: 240
              width: 240
              align: center
              pad_all: 0
              bg_color: Black
              border_width: 0  
              widgets:
              - meter:
                  height: 100%
                  width: 100%
                  align: center
                  bg_color: Black
                  border_width: 0  

                  scales:
                    # Minor ticks
                    - ticks:
                        width: 2
                        count: 61
                        length: 10
                        color: Blue
                      range_from: 0
                      range_to: 60
                      angle_range: 360
                      rotation: 270

                      # Minuite hand
                      indicators:
                        - line:
                            id: minute_hand
                            width: 3
                            color: darkseagreen
                            r_mod: -1
                    # Major ticks
                    - angle_range: 330
                      rotation: 270
                      range_from: 0
                      range_to: 11
                      ticks:
                        width: 3
                        count: 12
                        length: 20
                        color: Blue
                      indicators:
                        - line:
                            id: hour_hand
                            width: 4
                            color: darkseagreen
                            r_mod: -25
              - label:
                  pad_all: 0
                  border_width: 0
                  id: digital_time
                  align: CENTER
                  y: -30
                  text_font: roboto64
                  text_color: darkorange
                  bg_color: Black

              - label:
                  pad_all: 0
                  border_width: 0
                  id: digital_date
                  align: CENTER
                  y: +25
                  text_font: roboto48
                  text_color: darkorange
                  bg_color: Black

time:
  - platform: homeassistant
    id: local_time
    on_time:
      - seconds: 0
        minutes: /1
        then:
          - lvgl.indicator.update:
              id: minute_hand
              end_value: !lambda 'return id(local_time).now().minute;'
          - lvgl.indicator.update:
              id: hour_hand
              end_value: !lambda 'return id(local_time).now().hour % 12;'
          - lvgl.label.update:
              id: digital_time
              text:
                format: "%02d:%02d"
                args: [ id(local_time).now().hour, id(local_time).now().minute ]
          - lvgl.label.update:
              id: digital_date
              text: !lambda |-
                char buf[30];
                char dayname[] = "XXXSunMonTueWedThuFriSat";
                sprintf(buf, "%3.3s %d%s", &dayname[id(local_time).now().day_of_week * 3], id(local_time).now().day_of_month, (id(local_time).now().day_of_month % 10) == 1? "st" : (id(local_time).now().day_of_month % 10) == 2? "nd" : (id(local_time).now().day_of_month % 10) == 3? "rd" : "th");
                return std::string(buf);

