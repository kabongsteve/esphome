number:

  - platform: template
    id: capacity
    name: "Capacity"
    unit_of_measurement: "lt"
    optimistic: true
    min_value: 1
    max_value: 3000
    step: 1
    initial_value: 2400
    restore_value: true

  - platform: template
    id: switch_mains_level
    name: "Switch Mains Level"
    unit_of_measurement: "lt"
    optimistic: true
    min_value: 0
    max_value: 2400
    step: 5
    initial_value: 50
    restore_value: true

  - platform: template
    name: Screen timeout
    optimistic: true
    id: display_timeout
    unit_of_measurement: "s"
    initial_value: 45
    restore_value: true
    min_value: 10
    max_value: 180
    step: 5
    mode: slider

  - platform: template
    name: Run Duration
    optimistic: true
    id: run_duration
    unit_of_measurement: min
    initial_value: 15
    restore_value: true
    min_value: 5
    max_value: 125
    step: 5
    mode: slider
    on_value: 
      then:
        - lvgl.indicator.update:
            id: level_arc
            end_value: !lambda 'return (int)(id(run_duration).state);'
        - lvgl.label.update:
            id: runtime_lbl
            text:
              format: "%.0f min"
              args: [ id(run_duration).state ]


# --------------------------------------
# -            SENSORS                 -
# --------------------------------------

uart:
  rx_pin: GPIO44
  tx_pin: GPIO43
  baud_rate: 9600

sensor:

  - platform: "jsn_sr04t"
    id: tanklevel
    model: "aj_sr04m"
    name: "Tank Sensor"
    internal: false
    filters:
      - sliding_window_moving_average:
          window_size: 60
          send_every: 180
      - filter_out: NAN

  - platform: copy
    source_id: tanklevel
    id: volume
    name: "TankLevel"
    state_class: "measurement"
    unit_of_measurement: "lt"
    accuracy_decimals: 1
    filters:
      - lambda: |-
          double depth = x;
          if (isnan(depth))
            return 0.0;
          auto empty = 1658.0; // mm
          auto unit = 15.0;  // lt/cm
          depth *= 1000;
          if (depth > empty)
            depth = empty;
          return (double)((int)((empty - depth) * unit / 100) * 10);
      - filter_out: NAN

  - platform: copy
    id: level_percent
    source_id: volume
    name: "TankLevel Percent"
    state_class: "measurement"
    unit_of_measurement: "%"
    accuracy_decimals: 1
    filters:
      - lambda: return x / 24;

  - platform: copy # Reports the WiFi signal strength in %
    id: level_image
    source_id: volume
    name: "TankLevel Image"
    internal: true
    filters:
      - lambda: return x * 2 / 10;
      - round: 0

  - platform: wifi_signal # Reports the WiFi signal strength/RSSI in dB
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"
    on_value:
      - lvgl.label.update:
          id: wifi_lbl
          text: 
            format: "%.0fdBm"
            args: [x]

  - platform: rotary_encoder
    id: encoder
    pin_a: GPIO10
    pin_b: GPIO13
    resolution: 1
    min_value: 0
    max_value: 20
    on_clockwise:
      - if:
          condition: 
            lambda: 'return id(mode).active_index() == 0;'
          then:
            - select.set_index:
                id: source
                index: 0
            - number.set:
                id: run_duration
                value: 15
            - select.operation:
                id: mode
                operation: next
                cycle: true
      - if:
          condition: 
            lambda: 'return id(mode).active_index() == 1;'
          then:
            - select.operation:
                id: source
                operation: next
                cycle: true
      - if:
          condition: 
            lambda: 'return id(mode).active_index() == 2;'
          then:
            - number.increment:
                id: run_duration
                cycle: true
      - if:
          condition: 
            lambda: 'return id(mode).active_index() == 3;'
          then:
            - sprinkler.set_current_valve_duration:
                id: sprinklers
                run_duration: !lambda 'return id(sprinklers).time_remaining_active_valve().value() + 300;'

    on_anticlockwise:
      - if:
          condition: 
            lambda: 'return id(mode).active_index() == 0;'
          then:
            - select.set_index:
                id: source
                index: 0
            - number.set:
                id: run_duration
                value: 15
            - select.operation:
                id: mode
                operation: next
                cycle: true
      - if:
          condition: 
            lambda: 'return id(mode).active_index() == 1;'
          then:
            - select.operation:
                id: source
                operation: previous
                cycle: true
      - if:
          condition: 
            lambda: 'return id(mode).active_index() == 2;'
          then:
            - number.decrement:
                id: run_duration
                cycle: true
      - if:
          condition: 
            lambda: 'return id(mode).active_index() == 3;'
          then:
              - if:
                  condition: 
                    lambda: 'return id(sprinklers).time_remaining_active_valve().value() < 300;'
                  then:
                    - select.set_index:
                        id: mode
                        index: 0
                  else:
                    - sprinkler.set_current_valve_duration:
                        id: sprinklers
                        run_duration: !lambda 'return id(sprinklers).time_remaining_active_valve().value() - 300;'

binary_sensor:
  - platform: gpio
    name: Button
    id: front_button
    pin: 
      number: GPIO14
      inverted: True
    on_multi_click:
    - timing:
        - ON for at most 0.5s
        - OFF for at most 0.5s
        - ON for at most 0.5s
        - OFF for at least 0.2s
      then:
        - select.set_index:
            id: source
            index: 0
        - number.set:
            id: run_duration
            value: 15
        - select.set_index:
            id: mode
            index: 3
    - timing:
        - ON for at most 1s
        - OFF for at least 0.2s
      then:
        - if:
            condition: 
              lambda: 'return id(mode).active_index() == 0;'
            then:
              - select.set_index:
                  id: source
                  index: 0
              - number.set:
                  id: run_duration
                  value: 15
        - select.operation:
            id: mode
            operation: next
            cycle: true
    - timing:
        - ON for at least 2s
      then:
        - select.set_index:
            id: mode
            index: 0

select:
  - platform: lvgl
    widget: source_roller
    name: "Source"
    id: source

  - platform: template
    id: mode
    name: "Mode"
    optimistic: true
    options:
      - 'Idle'
      - 'Source'
      - 'Time'
      - 'Running'
    initial_option: 'Idle'
    on_value: 
      then:
        - component.update: state
        - lvgl.widget.update:
            id: mode_0
            hidden: !lambda 'return i != 0;'
        - lvgl.widget.update: 
            id: mode_1
            hidden: !lambda 'return i != 1;'
        - lvgl.widget.update:
            id: mode_2
            hidden: !lambda 'return i != 2;'
        - lvgl.widget.update:
            id: mode_3
            hidden: !lambda 'return i != 3;'
        - lvgl.label.update:
            id: status_lbl
            text: 
              format: "%s"
              args: [x.c_str()]
        - if:
            condition:
              lambda: 'return i == 0;'
            then:
              - sprinkler.shutdown: sprinklers
        - if:
            condition:
              lambda: 'return i == 3;'
            then:
              - if:
                  condition: 
                    lambda: 'return id(sprinklers).active_valve().has_value();'
                  else:
                    - if:
                        condition:
                          lambda: 'return (id(volume).state < id(switch_mains_level).state) && id(source).active_index().value() < 4;'
                        then:
                            - sprinkler.start_single_valve:
                                id: sprinklers
                                valve_number: !lambda 'return id(source).active_index().value() + 4;'

                                run_duration: !lambda 'return (int)(id(run_duration).state * 60);'
                        else:
                            - sprinkler.start_single_valve:
                                id: sprinklers
                                valve_number: !lambda 'return id(source).active_index().value();'
                                run_duration: !lambda 'return (int)(id(run_duration).state * 60);'

button:
  - platform: template
    id: runOnce
    name: "Run"
    on_press:
      - if:
          condition:
            lambda: 'return id(sprinklers).active_valve().has_value();'
          then:
            - select.set_index:
                id: mode
                index: 0
          else:      
            - select.set_index:
                id: mode
                index: 3
        


switch:
  - platform: gpio
    id: pump
    pin:
      pcf8574: relays
      number: 7
      inverted: true
    interlock: [mains]
    internal: true
  - platform: gpio
    id: mains
    pin:
      pcf8574: relays
      number: 6
      inverted: true
    interlock: [pump]
    internal: true
  - platform: gpio
    id: hose
    pin:
      pcf8574: relays
      number: 5
      inverted: true
    internal: true
  - platform: gpio
    id: garden
    pin:
      pcf8574: relays
      number: 4
      inverted: true
    internal: true
  - platform: gpio
    id: front
    pin:
      pcf8574: relays
      number: 3
      inverted: true
    internal: true
  - platform: gpio
    id: fence
    pin:
      pcf8574: relays
      number: 2
      inverted: true
    internal: true
  - platform: gpio
    id: back
    pin:
      pcf8574: relays
      number: 1
      inverted: true
    internal: true
  - platform: gpio
    id: empty2
    pin:
      pcf8574: relays
      number: 0
      inverted: true
    internal: true
  - platform: template
    id: advance
    internal: true
    optimistic: true

sprinkler:
  - id: sprinklers
    auto_advance_switch: advance
    main_switch: 
      name: "Sprinklers"
      id: main_switch
      on_turn_off:
        - select.set_index: 
            id: mode
            index: 0
      on_turn_on:
        - component.update: valve_name
        - lvgl.label.update:
            id: valve_lbl
            text: !lambda return id(valve_name).state;
        - component.update: time_remaining
        - lvgl.label.update:
            id: elapsed_lbl
            text: !lambda return id(time_remaining).state;
        - select.set_index:
            id: mode
            index: 3
    valve_overlap: 1s
    pump_start_pump_delay: 1s
    #pump_stop_valve_delay: 1s
    valves:
      - valve_switch: "Hose"
        valve_switch_id: hose
        pump_switch_id: pump
        run_duration: 900s
      - valve_switch: "Garden"
        valve_switch_id: garden
        pump_switch_id: pump
        run_duration: 900s
      - valve_switch: "Front"
        valve_switch_id: front
        pump_switch_id: pump
        run_duration: 900s
      - valve_switch: "Back"
        valve_switch_id: back
        pump_switch_id: pump
        run_duration: 900s
      - valve_switch: "Hose M"
        valve_switch_id: hose
        pump_switch_id: mains
        run_duration: 900s
      - valve_switch: "Garden M"
        valve_switch_id: garden
        pump_switch_id: mains
        run_duration: 900s
      - valve_switch: "Front M"
        valve_switch_id: front
        pump_switch_id: mains
        run_duration: 900s
      - valve_switch: "Back M"
        valve_switch_id: back
        pump_switch_id: mains
        run_duration: 900s

interval:
  - interval: 5s
    startup_delay: 5s
    then:
      - component.update: tanklevel
      - lvgl.label.update:
          id: tank_lbl
          text:
            format: "%0.0f lt"
            args: [ 'id(volume).state' ]
      - lvgl.image.update:
          id: water_img
          offset_y: !lambda 'return -(int)(id(level_image).state);'
  - interval: 1s
    startup_delay: 5s
    then:
      - if:
          condition: 
            lambda: 'return id(sprinklers).active_valve().has_value();'
          then:
            - if:
                condition:
                  lambda: 'return (id(volume).state < id(switch_mains_level).state) && id(pump).state;'
                then:
                  - switch.turn_on: mains
            - component.update: time_remaining
            - component.update: state
            - lvgl.label.update:
                id: elapsed_lbl
                text: !lambda return id(time_remaining).state;
            - lvgl.indicator.update:
                id: remaining_arc
                end_value: !lambda 'return id(sprinklers).time_remaining_active_valve().value() / 60;'

text_sensor:
  - platform: template
    id: time_remaining
    lambda: |-
      if (!id(sprinklers).active_valve().has_value())
        return { "00:00" };
      auto remaining = id(sprinklers).time_remaining_active_valve().value();
      char buf[8];
      sprintf(buf, "%d:%02d", remaining / 60, remaining % 60);
      std::string result(buf);
      return result;

  - platform: template
    id: valve_name
    lambda: |-
      if (!id(sprinklers).active_valve().has_value())
        return { "" };
      auto active = id(sprinklers).active_valve().value();
      auto name = id(sprinklers).valve_name(active);
      std::string result(name);
      return result;

  - platform: template
    id: state
    name: "Sprinkler State"
    lambda: |-
      if (!id(sprinklers).active_valve().has_value())
        return { "Idle" };
      auto active = id(sprinklers).active_valve().value();
      auto remaining = id(sprinklers).time_remaining_active_valve().value();
      auto name = id(sprinklers).valve_name(active);
      char buf[80];
      sprintf(buf, "%s: %d:%02d", name, remaining / 60, remaining % 60);
      std::string result(buf);
      return result;

light:
  - platform: monochromatic
    name: "Backlight"
    output: backlight_output
    id: display_backlight
    restore_mode: ALWAYS_ON
