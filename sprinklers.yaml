# --------------------------------------
# -            HARDWARE                -
# --------------------------------------

i2c:
  - id: i2c_bus
    sda: 17
    scl: 18
    scan: true
    frequency: 400kHz

spi:
  id: spi_bus
  mosi_pin: GPIO0
  clk_pin: GPIO46

pcf8574:
  - id: relays
    i2c_id: i2c_bus
    address: 0x21
    pcf8575: true

output:
  - platform: ledc
    pin: GPIO38
    id: backlight_output
# --------------------------------------
# -            DISPLAY                 -
# --------------------------------------
display:
  - platform: st7701s
    id: round_display
    auto_clear_enabled: false
    color_order: rgb
    data_rate: 10MHz
    spi_mode: MODE3
    dimensions:
      width: 480
      height: 480
    cs_pin: GPIO1
    #reset_pin: GPIO
    de_pin: GPIO2
    hsync_pin: GPIO3
    vsync_pin: GPIO42
    pclk_pin: GPIO45
    pclk_frequency: 12MHz
    pclk_inverted: false
    hsync_front_porch: 10
    hsync_pulse_width: 8
    hsync_back_porch: 50
    vsync_front_porch: 10
    vsync_pulse_width: 8
    vsync_back_porch: 20
    data_pins:
      red:
        - 11        #r1
        - 15        #r2
        - 12        #r3
        - 16        #r4
        - 21        #r5
      green:
        - 39        #g0
        - 07        #g1
        - 47        #g2
        - 08        #g3
        - 48        #g4
        - 09        #g5
      blue:
        - 04        #b1
        - 41        #b2
        - 05        #b3
        - 40        #b4
        - 06        #b5
    init_sequence:
      - [0x01]
      - delay 120ms
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x10]
      - [0xC0, 0x3B, 0x00]
      - [0xC1, 0x0B, 0x02]
      - [0xC2, 0x00, 0x02]
      - [0xCC, 0x10]
      - [0xCD, 0x08]
      - [0xB0, 0x02, 0x13, 0x1B, 0x0D, 0x10, 0x05, 0x08, 0x07, 0x07, 0x24, 0x04, 0x11, 0x0E, 0x2C, 0x33, 0x1D]
      - [0xB1, 0x05, 0x13, 0x1B, 0x0D, 0x11, 0x05, 0x08, 0x07, 0x07, 0x24, 0x04, 0x11, 0x0E, 0x2C, 0x33, 0x1D]
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x11]
      - [0xB0, 0x5d]
      - [0xB1, 0x43]
      - [0xB2, 0x81]
      - [0xB3, 0x80]
      - [0xB5, 0x43]
      - [0xB7, 0x85]
      - [0xB8, 0x20]
      - [0xC1, 0x78]
      - [0xC2, 0x78]
      - [0xD0, 0x88]
      - [0xE0, 0x00, 0x00, 0x02]
      - [0xE1, 0x03, 0xA0, 0x00, 0x00, 0x04, 0xA0, 0x00, 0x00, 0x00, 0x20, 0x20]
      - [0xE2, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      - [0xE3, 0x00, 0x00, 0x11, 0x00]
      - [0xE4, 0x22, 0x00]
      - [0xE5, 0x05, 0xEC, 0xA0, 0xA0, 0x07, 0xEE, 0xA0, 0xA0, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      - [0xE6, 0x00, 0x00, 0x11, 0x00]
      - [0xE7, 0x22, 0x00]
      - [0xE8, 0x06, 0xED, 0xA0, 0xA0, 0x08, 0xEF, 0xA0, 0xA0, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      - [0xEB, 0x00, 0x00, 0x40, 0x40, 0x00, 0x00, 0x00]
      - [0xEd, 0xFF, 0xFF, 0xFF, 0xBA, 0x0A, 0xBF, 0x45, 0xFF, 0xFF, 0x54, 0xFB, 0xA0, 0xAB, 0xFF, 0xFF, 0xFF]
      - [0xEF, 0x10, 0x0D, 0x04, 0x08, 0x3F, 0x1F]
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x13]
      - [0xEF, 0x08]
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x00]
      - [0x36, 0x08]
      - [0x3A, 0x60]
      - [0x11]
      - delay 100ms
      - [0x29]
      - delay 50ms

touchscreen:
  platform: cst826
  id: touch
  #interrupt_pin: GPIO40
  #reset_pin: GPIO16
  i2c_id: i2c_bus
  skip_probe: True
  update_interval: 25ms
  on_touch:
    - if:
        condition: lvgl.is_paused
        then:
          - logger.log: "LVGL resuming"
          - lvgl.resume:
          - lvgl.widget.redraw:
    - light.turn_on: 
        id: display_backlight
        brightness: 100%

