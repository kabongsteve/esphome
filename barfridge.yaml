esphome:
  name: barfridge
  friendly_name: barfridge

esp8266:
  board: esp01_1m

# Enable logging
logger:
  baud_rate: 0

# Enable Home Assistant API
api:
  encryption:
    key: "b8JMamQy7l3WA0lfEhMDd5PmD1cpkTr/c8p7zLJMRL8="

ota:
  - platform: esphome
    password: "64148bcc22f9357feb759cd624668b9c"

wifi:
  fast_connect: true
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

web_server:
  include_internal: true
  js_include: "./v2/www.js"
  js_url: ""
  css_url: ""
  css_include: "./v2/webserver-v1.min.js"
  version: 2
  
switch:
  - platform: gpio
    pin: GPIO12
    name: "compressor"
    id: compressor_relay

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      inverted: True
    id: bathroom_compressor_relay_button
    on_press:
      then:
        - switch.toggle: compressor_relay

sensor:
  - platform: dht
    model: AM2302
    pin: GPIO14
    humidity:
      name: "Humidity"
      id: humidity_sensor
    temperature:
      name: "Temperature"
      id: temp_sensor
    update_interval: 300s

  - platform: wifi_signal # Reports the WiFi signal strength/RSSI in dB
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 300s
    entity_category: "diagnostic"

  - platform: copy # Reports the WiFi signal strength in %
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: "diagnostic"
    device_class: ""

climate:
  - platform: thermostat
    name: "Controller"
    visual:
      min_temperature: 5
      max_temperature: 20
      temperature_step: 1
    sensor: temp_sensor
    humidity_sensor: humidity_sensor
    min_cooling_off_time: 45min
    min_cooling_run_time: 15min
    min_idle_time: 5min
    cool_deadband: 1 °C
    cool_action:
      - switch.turn_on: compressor_relay
    idle_action:
      - switch.turn_off: compressor_relay
    default_preset: Wine
    on_boot_restore_from: default_preset
    preset:
      - name: Wine
        mode: cool
        default_target_temperature_high: 10 °C    
