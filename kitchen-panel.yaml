spi:
  clk_pin: GPIO13
  mosi_pin: GPIO14
  miso_pin: GPIO12

display:
  - platform: waveshare_epaper
    id: epaper_display
    cs_pin: GPIO15
    dc_pin: GPIO27
    reset_pin: GPIO26
    reset_duration: 100ms
    busy_pin: 
      number: GPIO25
      inverted: true
    model: 7.50in-bV3
    rotation: 0
    update_interval: never
    lambda: |-
      // Clock
      // it.strftime(25, 420, id(clock_font), "%H:%M", id(rtc_time).now());

      // Weather icon
      Color weather_icon_color;
      weather_icon_color.raw_32 = 0x0D;

      std::string conditions = id(weather_icon).state;

      std::string img = id(material_icons_map)[conditions.c_str()];

      uint left = 24;
      it.print(16, 8, id(weather_font), weather_icon_color, img.c_str());

      float value;


      #define NOT_NAN(x) ((x) == (x))

      // value = id(outdoor_temperature).state;
      // if (NOT_NAN(value))
      //   it.printf(left, 200, id(small_font), "%.1f°C (M %.1f)", value, id(max_temp).state);
      // else
      //   it.print(left, 200, id(small_font), "---");

      // value = id(kitchen_temp).state;
      // if (NOT_NAN(value))
      //   it.printf(left, 245, id(small_font), "Inside %.1f°C", value);
      // else
      //   it.print(left, 245, id(small_font), "---");

      // value = id(rain_today).state;
      // if (NOT_NAN(value))
      //   it.printf(left, 290, id(small_font), "%.1f mm (%.1f)", value, id(max_rain).state);
      // else
      //   it.print(left, 290, id(small_font), "---");

      // value = id(rain_rate).state;
      // if (NOT_NAN(value))
      //   it.printf(left, 320, id(small_font), "%.1f mm/h", value);
      // else
      //   it.print(left, 320, id(small_font), "---");

      // value = id(tank_level).state;
      // float perc = value * 100 / 2200.0;
      // if (NOT_NAN(value))
      //   it.printf(left, 380, id(small_font), "%.0f lt (%.0f%%)", value, perc);


      uint col1 = 20;
      uint col2 = 280;
      uint col3 = 570;

      uint base_y = 220;
      uint rowgap = 90;
      uint halfgap = 25;
      uint gap = 70;

      wrap_text(&it, col2 + gap, 26, id(weather_desc).state.c_str(), id(tiny_font), TextAlign::TOP_LEFT, 1);
      //it.graph(col1, 6, id(energy_graph));

      it.printf(col1 + gap, base_y - halfgap, id(tiny_font), "Outdoor °C");
      it.printf(col2 + gap, base_y - halfgap, id(tiny_font), "Indoor °C");
      it.printf(col3 + gap, base_y - halfgap, id(tiny_font), "Rain mm");

      it.printf(col1, base_y, id(tiny_font), "%4.1f", id(max_temp).state);
      it.printf(col1, base_y + halfgap, id(tiny_font), "%4.1f", id(min_temp).state);

      value = id(outdoor_temperature).state;
      if (NOT_NAN(value))
        it.printf(col1 + gap, base_y, id(normal_font), "%.1f", value);

      value = id(house_temp).state;
      if (NOT_NAN(value))
        it.printf(col2 + gap, base_y, id(normal_font), "%.1f", value);

      it.printf(col3, base_y, id(tiny_font), "%.1f%%", id(rain_chance).state);
      it.printf(col3, base_y + halfgap, id(tiny_font), "%.0f-%.0f", id(min_rain).state, id(max_rain).state);
      value = id(rain_today).state;
      if (NOT_NAN(value))
        it.printf(col3 + gap + 10, base_y, id(normal_font), "%.1f", value);


      base_y += 60;

      value = id(humidity).state;
      if (NOT_NAN(value))
        it.printf(col1 + gap, base_y, id(small_font), "%4.0f%%", value);

      it.print(col2 - gap, base_y, id(tiny_font), "Humidity");
      value = id(kitchen_humidity).state;
      if (NOT_NAN(value))
        it.printf(col2 + gap, base_y, id(small_font), "%4.0f%%", value);

      base_y += 30;
      it.print(col3, base_y, id(small_icons_font), weather_icon_color, "\U000F1019");
      value = id(tank_level).state;
      float perc = value * 100 / 2200.0;
      if (NOT_NAN(value))
        it.printf(col3 + gap, base_y, id(normal_font), "%3.0f%%", perc);

      base_y += rowgap;

      it.print(col1 + gap, base_y - halfgap, id(tiny_font), "Solar kW");
      it.print(col2 + gap, base_y - halfgap, id(tiny_font), "House kW");
      it.print(col3 + gap, base_y - halfgap, id(tiny_font), "Battery %");

      it.print(col1, base_y, id(small_icons_font), weather_icon_color, "\U000F0D9C");
      value = id(solar_energy).state / 1000.;
      if (NOT_NAN(value))
        it.printf(col1 + gap, base_y, id(normal_font), "%.2f", value);

      it.print(col2, base_y, id(small_icons_font), weather_icon_color, "\U000F1904");
      value = id(load_energy).state / 1000.;
      if (NOT_NAN(value))
        it.printf(col2 + gap, base_y, id(normal_font), "%.2f", value);

      it.print(col3, base_y, id(small_icons_font), weather_icon_color, "\U000F12A5");
      value = id(battery_level).state;
      if (NOT_NAN(value))
        it.printf(col3 + gap, base_y, id(normal_font), "%3.0f", value);

      // base_y += rowgap;

      // it.print(col2, base_y, id(small_icons_font), weather_icon_color, "\U000F1901");
      // value = id(battery_power).state / 1000.;
      // if (NOT_NAN(value))
      //   it.printf(col2 + gap, base_y, id(normal_font), "%.2f kW", value);
      // else
      //   it.print(col2 + gap, base_y, id(normal_font), "---");

      // base_y += 50;
      // conditions = id(ems_mode).state;
      // if (strncmp(conditions.c_str(), "Self", 4) == 0)
      //   conditions = "Normal";
      // else {
      //   conditions = id(battery_mode).state;
      //   if (strncmp(conditions.c_str(), "Stop", 4) == 0)
      //     conditions = "Battery Off";
      // }
      // it.print(col2 + gap, base_y, id(tiny_font), weather_icon_color, conditions.c_str());


