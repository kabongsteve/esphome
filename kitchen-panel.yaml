font:
  - file: 'gfonts://Roboto'
    id: normal_font
    size: 56
    glyphs: [
        '󰶜',    # mdi-solar-panel-large
        '󱤄',    # mdi-home-lightning-bolt-outline
        '󰴾',    # mdi-transmission-tower
      ]
  - file: 'gfonts://Roboto'
    id: small_font
    size: 36
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: weather_font
    size: 196
    glyphs: [
        '󰖔',    #mdi-weather-night
        '󰖐',    #mdi-weather-cloudy
        '󰼯',    #mdi-weather-cloudy-alert
        '󰖑',    #mdi-weather-fog
        '󰖒',    #mdi-weather-hail
        '󰙾',    #mdi-weather-lightning-rainy
        '󰖓',    #mdi-weather-lightning
        '󰖕',    #mdi-weather-partly-cloudy
        '󰼱',    #mdi-weather-night-partly-cloudy
        '󰖖',    #mdi-weather-pouring
        '󰖗',    #mdi-weather-rainy
        '󰙿',    #mdi-weather-snowy-rainy
        '󰖘',    #mdi-weather-snowy
        '󰖙',    #mdi-weather-sunny
        '󰖞',    #mdi-weather-windy-variant
        '󰖝',    #mdi-weather-windy
        '󰨹',    #mdi-cloud-question
      ]

spi:
  clk_pin: GPIO13
  mosi_pin: GPIO14
  miso_pin: GPIO12

display:
  - platform: waveshare_epaper
    id: epaper_display
    cs_pin: GPIO15
    dc_pin: GPIO27
    reset_pin: GPIO26
    reset_duration: 100ms
    busy_pin: 
      number: GPIO25
      inverted: true
    model: 7.50in-bV3
    rotation: 0
    update_interval: never
    lambda: |-
      // Clock
      // it.strftime(25, 420, id(clock_font), "%H:%M", id(rtc_time).now());

      // Weather icon
      Color weather_icon_color;
      weather_icon_color.raw_32 = 0x0D;

      std::string conditions = id(weather_conditions).state;

      std::string img = id(material_icons_map)["mdi-cloud-question"];
      if (conditions == "clear-night")
      {
          conditions = "clear";
          img = id(material_icons_map)["mdi-weather-night"];
      }
      else if (conditions == "cloudy")
          img = id(material_icons_map)["mdi-weather-cloudy"];
      else if (conditions == "exceptional")
          img = id(material_icons_map)["mdi-weather-cloudy-alert"];
      else if (conditions == "fog")
          img = id(material_icons_map)["mdi-weather-fog"];
      else if (conditions == "hail")
          img = id(material_icons_map)["mdi-weather-hail"];
      else if (conditions == "lightning-rainy")
      {
          conditions = "thunderstorm";
          img = id(material_icons_map)["mdi-weather-lightning-rainy"];
      }
      else if (conditions == "lightning")
          img = id(material_icons_map)["mdi-weather-lightning"];
      else if (conditions == "partlycloudy")
      {
          bool is_night = id(sun_position).state == "below_horizon";
          if (is_night)
              img = id(material_icons_map)["mdi-weather-night-partly-cloudy"];
          else
              img = id(material_icons_map)["mdi-weather-partly-cloudy"];
          conditions = "partly cloudy";
      }
      else if (conditions == "pouring")
      {
          img = id(material_icons_map)["mdi-weather-pouring"];
          conditions = "shower";
      }
      else if (conditions == "rainy")
          img = id(material_icons_map)["mdi-weather-rainy"];
      else if (conditions == "snowy-rainy")
      {
          img = id(material_icons_map)["mdi-weather-snowy-rainy"];
          conditions = "sleet";
      }
      else if (conditions == "snowy")
          img = id(material_icons_map)["mdi-weather-snowy"];
      else if (conditions == "sunny")
          img = id(material_icons_map)["mdi-weather-sunny"];
      else if (conditions == "windy")
          img = id(material_icons_map)["mdi-weather-windy"];
      else if (conditions == "windy-variant")
      {
          img = id(material_icons_map)["mdi-weather-windy-variant"];
          conditions = "windy";
      }

      uint left = 24;
      it.print(left / 2, 8, id(weather_font), weather_icon_color, img.c_str());

      float value;


      #define NOT_NAN(x) ((x) == (x))

      value = id(outdoor_temperature).state;
      if (NOT_NAN(value))
        it.printf(left, 200, id(normal_font), "%.1f°C", value);
      else
        it.print(left, 200, id(normal_font), "---");

      value = id(rain_today).state;
      if (NOT_NAN(value))
        it.printf(left, 260, id(small_font), "%.1f mm", value);
      else
        it.print(left, 260, id(small_font), "---");

      value = id(rain_rate).state;
      if (NOT_NAN(value))
        it.printf(left, 300, id(small_font), "%.1f mm/h", value);
      else
        it.print(left, 300, id(small_font), "---");

      value = id(tank_level).state;
      if (NOT_NAN(value))
        it.printf(left, 380, id(small_font), "%.0f lt", value);

      value = value * 100 / 2200.0;
      if (NOT_NAN(value))
        it.printf(left, 440, id(small_font), "%.0f %", value);



      uint col1 = 230;

      it.graph(col1, 6, id(energy_graph));


      uint base_y = 320;
      uint rowgap = 70;
      uint gap = 60;


      it.print(col1, base_y, id(normal_font), weather_icon_color, "\U000F0D9C");
      value = id(solar_energy).state / 1000.;
      if (NOT_NAN(value))
        it.printf(col1 + gap, base_y, id(normal_font), "%.2f kW", value);
      else
        it.print(col1 + gap, base_y, id(normal_font), "---");

      base_y += rowgap;
      it.print(col1, base_y, id(normal_font), weather_icon_color, "\U000F1904");
      value = id(load_energy).state / 1000.;
      if (NOT_NAN(value))
        it.printf(col1 + gap, base_y, id(normal_font), "%.2f kW", value);
      else
        it.print(col1 + gap, base_y, id(normal_font), "---");

color:
  - id: weather_icon_color
    red: 100%
    blue: 100%
    green: 100%

graph:
  - id: energy_graph
    duration: 4h
    min_value: 0
    max_value: 10000
    width: 560
    height: 300
    x_grid: 1h
    y_grid: 2000
    border: false
    traces:
      - sensor: solar_energy
        line_type: SOLID
        line_thickness: 8
        continuous: true
        color: weather_icon_color
      - sensor: load_energy
        line_type: DASHED
        line_thickness: 8
        color: weather_icon_color


switch:
  - platform: restart
    id: restart_switch
    name: ${device_name} Restart

time:
  - platform: homeassistant
    id: homeassistant_time
    timezone: Australia/Canberra

sensor:
  - platform: homeassistant
    name: Load Energy
    id: load_energy
    entity_id: sensor.load_power
  - platform: homeassistant
    name: Solar Energy
    id: solar_energy
    entity_id: sensor.total_dc_power
  - platform: homeassistant
    name: Outdoor temperature
    id: outdoor_temperature
    entity_id: sensor.bromellws_sensors_temperature
  - platform: homeassistant
    name: rain_today
    id: rain_today
    entity_id: sensor.bromellws_sensors_precipitation_today
  - platform: homeassistant
    name: rain_rate
    id: rain_rate
    entity_id: sensor.bromellws_sensors_precipitation_rate
  - platform: homeassistant
    name: tank_level
    id: tank_level
    entity_id: sensor.sprinklers_tanklevel
  - platform: homeassistant
    name: Kitchen Temp
    id: kitchen_temp
    entity_id: sensor.kitchen_temp
  - platform: homeassistant
    name: Bedroom Temp
    id: bedroom_temp
    entity_id: sensor.bedroom_temp
  - platform: homeassistant
    name: Lounge Temp
    id: lounge_temp
    entity_id: sensor.lounge_temp

climate:
  - platform: thermostat
    name: "Bromell Climate Controller"
    sensor: lounge_temp
    min_heating_off_time: 300s
    min_heating_run_time: 300s
    min_idle_time: 30s
    heat_action:
      - logger.log: "switch.turn_on: heater"
    idle_action:
      - logger.log: "switch.turn_off: heater"
    default_preset: Home
    preset:
      - name: Home
        default_target_temperature_low: 19.5 °C

text_sensor:
  - platform: homeassistant
    name: Weather
    id: weather_conditions
    entity_id: ${weather_conditions}
  - platform: homeassistant
    name: Sun
    id: sun_position
    entity_id: sun.sun

interval:
  - interval: 300s
    then:
      - component.update: epaper_display



