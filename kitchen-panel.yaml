substitutions:
  device_name: Kitchen Panel
  device_id: kitchen-panel
  # Home assistant sensors
  # Weather conditions
  weather_conditions: weather.forecast_bromellws
  # Outdoor sensors
  outdoor_humidity: sensor.bromellws_sensors_humidity
  outdoor_rainfall: sensor.bromellws_sensors_precipitation_today
  outdoor_wind_strength: sensor.bromellws_sensors_wind_speed
  # Indoor sensors
  indoor_temperature: sensor.kitchen_temp
  indoor_humidity: sensor.kitchen_panel_humidity
 
esphome:
  name: ${device_id}
  name_add_mac_suffix: false
  project:
    name: esphome.web
    version: '1.0'
  on_boot:
    - priority: -100.0
      then:
        - delay: 10s
        - component.update: epaper_display
  includes:
    - <sstream>
    - text_wrap.h

esp32:
  board: az-delivery-devkit-v4
  framework:
    type: esp-idf

external_components:
  - source: github://Passific/m5paper_esphome

