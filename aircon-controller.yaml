esphome:
  name: accontroller
  friendly_name: Aircon Controller

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: "b6ymMt4mQmDtPxisG5/EXZzWRwzYgXN+7S7GC/UK6nc="

ota:
  - platform: esphome
    password: "b910852b7a32d2b59c0cb21ab2bb1d2b"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password


web_server:


number:
  - platform: template
    name: Master Offset
    optimistic: True
    min_value: -5
    max_value: 5
    step: 1
    initial_value: -2
    restore_value: true

switch:
  - platform: gpio
    id: Zone1
    pin: GPIO32
    name: Zone Jude Study
  - platform: gpio
    id: Zone2
    pin: GPIO33
    name: Zone Double Bedroom
  - platform: gpio
    id: Zone3
    pin: GPIO25
    name:  Zone Single Bedroom
  - platform: gpio
    id: Zone4
    pin: GPIO26
    name:  Zone Master Bedroom
  - platform: template
    id: dummy
    optimistic: True

output:
  - platform: gpio
    id: ledlink
    pin: GPIO23

sensor:
  - platform: homeassistant
    id: master_temp
    entity_id: sensor.bedroom_temp
  - platform: homeassistant
    id: house_temp
    entity_id: sensor.house_temp
  - platform: homeassistant
    id: lounge_temp
    entity_id: sensor.lounge_temp
  

climate:
  - platform: thermostat
    name: "AC"
    sensor: house_temp
    min_cooling_off_time: 30s
    min_cooling_run_time: 30s
    min_heating_off_time: 30s
    min_heating_run_time: 30s
    temperature_step: 0.1
    min_idle_time: 30s
    cool_action:
      - switch.turn_on: dummy
    heat_action:
      - switch.turn_on: dummy
    idle_action:
      - switch.turn_off: dummy
      - switch.turn_off: dummy
    default_preset: Home
    preset:
      - name: Home
        default_target_temperature_low: 20 °C
        default_target_temperature_high: 22 °C