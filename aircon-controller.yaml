esphome:
  name: accontroller
  friendly_name: Aircon Controller
  includes:
    - <sstream>

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: "b6ymMt4mQmDtPxisG5/EXZzWRwzYgXN+7S7GC/UK6nc="

ota:
  - platform: esphome
    password: "b910852b7a32d2b59c0cb21ab2bb1d2b"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password


web_server:


number:
  - platform: template
    name: Master Offset
    optimistic: True
    min_value: -5
    max_value: 5
    step: 1
    initial_value: -2
    restore_value: true
  - platform: template
    id: heat_offset
    name: Heat Offset
    optimistic: True
    min_value: 0
    max_value: 10
    step: 1
    initial_value: 4
    restore_value: true
  - platform: template
    name: Cool Offset
    id: cool_offset
    optimistic: True
    min_value: -10
    max_value: 0
    step: 1
    initial_value: -4
    restore_value: true

switch:
  - platform: gpio
    id: Zone1
    pin: GPIO32
    name: Zone Jude Study
  - platform: gpio
    id: Zone2
    pin: GPIO33
    name: Zone Double Bedroom
  - platform: gpio
    id: Zone3
    pin: GPIO25
    name:  Zone Single Bedroom
  - platform: gpio
    id: Zone4
    pin: GPIO26
    name:  Zone Master Bedroom
  - platform: template
    id: dummy
    optimistic: True

output:
  - platform: gpio
    id: ledlink
    pin: GPIO23

sensor:
  - platform: homeassistant
    id: master_temp
    entity_id: sensor.bedroom_temp
  - platform: homeassistant
    id: house_temp
    entity_id: sensor.house_temp
  - platform: homeassistant
    id: lounge_temp
    entity_id: sensor.lounge_temp

climate:
  - platform: thermostat
    id: ac
    name: "AC"
    sensor: house_temp
    min_cooling_off_time: 30s
    min_cooling_run_time: 30s
    min_heating_off_time: 30s
    min_heating_run_time: 30s
    cool_deadband: 0.5
    cool_overrun: 0.5
    heat_deadband: 0.5
    heat_overrun: 0.5
    # temperature_step: 0.1
    min_idle_time: 30s
    cool_action:
      - logger.log: Cooling Start
      - script.execute: to_cooling
    heat_action:
      - logger.log: Heating Start
      - script.execute: to_heating
    idle_action:
      - logger.log: Idle Start
      - script.execute: to_idle
    off_mode:
      - logger.log: Turned Off
      - script.execute: turn_off
    heat_mode:
      - logger.log: Set to Heat
      - script.execute: turn_on
    cool_mode:
      - logger.log: Set to Cool
      - script.execute: turn_on
    auto_mode:
      - logger.log: Set to Auto
      - script.execute: turn_on
    preset_change:
      - logger.log: Preset changed
      - script.execute: mode_changed
    target_temperature_change_action:
      - logger.log: Target Temp changed
      - script.execute: mode_changed

    default_preset: Summer Day
    preset:
      - name: Summer Day
        default_target_temperature_low: 21.5 °C
        default_target_temperature_high: 23 °C
        mode: COOL
      - name: Summer Night
        default_target_temperature_low: 22.5 °C
        default_target_temperature_high: 24 °C
        mode: COOL
      - name: Winter Day
        default_target_temperature_low: 19.6 °C
        default_target_temperature_high: 21 °C
        mode: HEAT
      - name: Winter Night
        default_target_temperature_low: 18.5 °C
        default_target_temperature_high: 21 °C
        mode: HEAT

script:
  - id: turn_off
    mode: single
    then:
      - logger.log: Turn Off Script
#      - script.execute: check_daikin_info

  - id: turn_on
    mode: single
    then:
      - logger.log: Turn on Script
#      - script.execute: check_daikin_info

  - id: set_temp
    then:
      - logger.log: 
          format: Set Temp %.1f %s
          args: [ 'id(ac).target_temperature', 'climate_mode_to_string(id(ac).mode)' ]
#      - script.execute: check_daikin_info

  - id: to_heating
    mode: single
    then:
      - logger.log: Set Heating
#      - script.execute: set_temp

  - id: to_cooling
    mode: single
    then:
      - logger.log: Set Cooling
#      - script.execute: set_temp

  - id: to_idle
    mode: single
    then:
      - logger.log: Set Idle
#      - script.execute: check_daikin_info

  - id: mode_changed
    mode: single
    then:
      - logger.log: Something changed
      - if:
          condition:
            lambda: 'return id(ac).action == CLIMATE_ACTION_HEATING;'
          then:
            - script.execute: to_heating
          else:
            - if:
                condition:
                  lambda: 'return id(ac).action == CLIMATE_ACTION_COOLING;'
                then:
                  - script.execute: to_cooling
                else:
                  - script.execute: to_idle


